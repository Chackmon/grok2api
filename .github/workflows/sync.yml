name: Upstream Sync (Exclude Workflows)

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */6 * * *" # 每 6 小时同步一次
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "上游仓库名（例如：vercel/next.js）。留空则自动获取"
        required: false
        type: string
      upstream_branch:
        description: "上游分支名。留空则自动获取默认分支"
        required: false
        type: string
      target_branch:
        description: "你的目标分支名。留空则自动获取默认分支"
        required: false
        type: string

concurrency:
  group: upstream-sync-${{ github.repository }}
  cancel-in-progress: true

jobs:
  sync_latest_from_upstream:
    name: Sync upstream changes excluding .github/workflows/**
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve upstream info
        id: repo_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_UPSTREAM_REPO: ${{ github.event.inputs.upstream_repo || '' }}
          INPUT_UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch || '' }}
          INPUT_TARGET_BRANCH: ${{ github.event.inputs.target_branch || '' }}
        run: |
          set -euo pipefail

          REPO_JSON="$(gh api "repos/${{ github.repository }}")"

          AUTO_UPSTREAM_REPO="$(echo "$REPO_JSON" | jq -r '.parent.full_name // empty')"
          AUTO_UPSTREAM_BRANCH="$(echo "$REPO_JSON" | jq -r '.parent.default_branch // empty')"
          AUTO_TARGET_BRANCH="$(echo "$REPO_JSON" | jq -r '.default_branch // empty')"

          UPSTREAM_REPO="${INPUT_UPSTREAM_REPO:-$AUTO_UPSTREAM_REPO}"
          UPSTREAM_BRANCH="${INPUT_UPSTREAM_BRANCH:-$AUTO_UPSTREAM_BRANCH}"
          TARGET_BRANCH="${INPUT_TARGET_BRANCH:-$AUTO_TARGET_BRANCH}"

          if [ -z "$UPSTREAM_REPO" ]; then
            echo "错误：无法自动获取上游仓库，请手动填写 upstream_repo"
            exit 1
          fi

          if [ -z "$UPSTREAM_BRANCH" ]; then
            echo "错误：无法自动获取上游分支，请手动填写 upstream_branch"
            exit 1
          fi

          if [ -z "$TARGET_BRANCH" ]; then
            echo "错误：无法自动获取目标分支，请手动填写 target_branch"
            exit 1
          fi

          echo "upstream_repo=$UPSTREAM_REPO" >> "$GITHUB_OUTPUT"
          echo "upstream_branch=$UPSTREAM_BRANCH" >> "$GITHUB_OUTPUT"
          echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"

          echo "Upstream repo: $UPSTREAM_REPO"
          echo "Upstream branch: $UPSTREAM_BRANCH"
          echo "Target branch: $TARGET_BRANCH"

      - name: Sync upstream changes excluding workflows
        id: sync
        env:
          UPSTREAM_REPO: ${{ steps.repo_info.outputs.upstream_repo }}
          UPSTREAM_BRANCH: ${{ steps.repo_info.outputs.upstream_branch }}
          TARGET_BRANCH: ${{ steps.repo_info.outputs.target_branch }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote remove upstream 2>/dev/null || true
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"

          git fetch --no-tags origin "${TARGET_BRANCH}"
          git fetch --no-tags upstream "${UPSTREAM_BRANCH}"

          git checkout "${TARGET_BRANCH}"
          git reset --hard "origin/${TARGET_BRANCH}"

          MERGE_BASE="$(git merge-base HEAD "upstream/${UPSTREAM_BRANCH}")"

          if [ -z "$MERGE_BASE" ]; then
            echo "错误：无法找到与上游分支的共同祖先"
            exit 1
          fi

          PATCH_FILE="$(mktemp)"

          git diff --binary "$MERGE_BASE" "upstream/${UPSTREAM_BRANCH}" -- . ':(exclude).github/workflows/**' > "$PATCH_FILE"

          if [ ! -s "$PATCH_FILE" ]; then
            echo "没有需要同步的上游变更（已排除 .github/workflows/**）"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git apply -3 --index "$PATCH_FILE"; then
            echo "同步失败：补丁应用冲突，请手动处理"
            exit 1
          fi

          # 再次确保 workflows 目录保持为你当前仓库目标分支的版本
          git restore --source="origin/${TARGET_BRANCH}" --staged --worktree .github/workflows || true

          if git diff --cached --quiet && git diff --quiet; then
            echo "应用补丁后没有实际变更"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: sync upstream ${UPSTREAM_REPO}@${UPSTREAM_BRANCH} (exclude .github/workflows)"
          git push origin "HEAD:${TARGET_BRANCH}"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Sync result
        if: ${{ success() }}
        run: |
          if [ "${{ steps.sync.outputs.changed }}" = "true" ]; then
            echo "同步完成：已推送最新上游变更（已排除 .github/workflows/**）"
          else
            echo "同步完成：没有需要更新的内容"
          fi

      - name: Sync check
        if: ${{ failure() }}
        run: echo "同步失败，请手动检查冲突或分支保护规则"
